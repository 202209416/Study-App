<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Complete! - SmartEco Study Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: fall 3s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-2xl w-full bg-white rounded-3xl p-8 text-center relative z-10">
        
        <!-- Animated badge -->
        <div class="w-32 h-32 mx-auto mb-6 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full flex items-center justify-center text-6xl animate-bounce">
            🏆
        </div>
        
        <!-- Title -->
        <h1 class="text-4xl font-bold text-gray-900 mb-2">Lesson Complete!</h1>
        <p class="text-xl text-gray-600 mb-8">You've mastered the basics of Python</p>
        
        <!-- XP gained -->
        <div class="bg-indigo-50 rounded-2xl p-6 mb-8">
            <div class="text-5xl font-bold text-indigo-600 mb-2">+50 XP</div>
            <div class="text-gray-600">Total XP: 450/500</div>
            <div class="w-full h-4 bg-gray-200 rounded-full mt-4 overflow-hidden">
                <div class="h-full bg-gradient-to-r from-indigo-500 to-purple-500" style="width: 90%"></div>
            </div>
        </div>
        
        <!-- Badge unlocked -->
        <div class="grid md:grid-cols-2 gap-6 mb-8">
            <div class="bg-green-50 rounded-xl p-4">
                <div class="text-3xl mb-2">🏅</div>
                <h3 class="font-bold text-green-800">Code Novice</h3>
                <p class="text-sm text-green-600">First lesson completed!</p>
            </div>
            <div class="bg-purple-50 rounded-xl p-4 opacity-50">
                <div class="text-3xl mb-2">🔒</div>
                <h3 class="font-bold text-purple-800">Loop Master</h3>
                <p class="text-sm text-purple-600">Complete Lesson 3</p>
            </div>
        </div>
        
        <!-- Level up check -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl p-6 mb-8">
            <div class="text-2xl mb-2">🎉 Level Up! 🎉</div>
            <div class="text-4xl font-bold mb-2">Level 4 → Level 5</div>
            <p>You've unlocked: Hardware Mode!</p>
        </div>
        
        <!-- Hardware celebration -->
        <div class="border-2 border-indigo-200 rounded-xl p-6 mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-lg mb-2">Study Box</h3>
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-sm">Connected</span>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <div class="w-8 h-8 bg-indigo-500 rounded"></div>
                    <div class="w-8 h-8 bg-purple-500 rounded"></div>
                    <div class="w-8 h-8 bg-pink-500 rounded"></div>
                </div>
            </div>
            <p class="text-sm text-gray-600 mt-4">✨ LED blinking rainbow mode!</p>
        </div>
        
        <!-- Next steps -->
        <div class="flex flex-col sm:flex-row gap-4">
            <button onclick="window.location.href='dashboard.html'" class="flex-1 px-6 py-4 bg-gray-200 rounded-xl font-bold hover:bg-gray-300 transition">
                Back to Dashboard
            </button>
            <button onclick="window.location.href='lesson.html'" class="flex-1 px-6 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-bold hover:shadow-lg transition">
                Next Lesson →
            </button>
        </div>
    </div>
    
    <script>
        // Create confetti celebration
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
                confetti.style.width = Math.random() * 15 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }, i * 50);
        }
    </script>
</body>
</html>
